# Run the integration tests with various versions of MonetDB
name: Integration tests

on:
  push:
    branches: [main]
  pull_request:
env:
  CARGO_TERM_COLOR: always
jobs:

  monetdb_version:
    runs-on: ubuntu-latest
    container: python:3.11
    env:
      CI_SERVER_URL: monetdb://monetdb/monetdb
    strategy:
      fail-fast: false
      matrix:
        monetdbversion: [ default, Aug2024, Jun2020 ]
    services:
      monetdb:
        image: "monetdb/dev-builds:${{ matrix.monetdbversion }}"
        env:
          MDB_DB_ADMIN_PASS: monetdb
        ports:
        - 50000:50000
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Wait for MonetDB to accept connections
        run: |
          python - <<'PY'
          import socket
          import time

          last = "server closed the connection without a challenge"
          for attempt in range(60):
              try:
                  with socket.create_connection(("monetdb", 50000), timeout=2) as connection:
                      connection.settimeout(2)
                      if connection.recv(2):
                          print(f"MonetDB ready after {attempt + 1} attempts")
                          break
              except OSError as exc:
                  last = exc
                  time.sleep(2)
          else:
              raise SystemExit(f"MonetDB never became ready: {last}")
          PY

      - run: cargo test --test ci --features ci-tests
      - run: cargo test --test ci --no-default-features --features ci-tests
      - run: cargo test --test ci --all-features
